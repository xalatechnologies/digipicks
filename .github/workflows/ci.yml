name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  # ============================================================================
  # Lint & Typecheck
  # ============================================================================
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared (required for typecheck)
        run: pnpm --filter @digilist-saas/shared build

      - name: Lint all workspaces
        run: pnpm lint

      - name: Typecheck packages
        run: |
          pnpm -r --if-present \
            --filter '@digilist-saas/shared' \
            --filter '@digilist-saas/i18n' \
            --filter '@digilist-saas/ds' \
            --filter '@digilist-saas/sdk' \
            --filter '@digilist-saas/app-shell' \
            run typecheck

  # ============================================================================
  # SDK Unit Tests
  # ============================================================================
  test-sdk:
    name: SDK Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared (required for SDK)
        run: pnpm --filter @digilist-saas/shared build

      - name: Run SDK tests
        run: pnpm --filter @digilist-saas/sdk test

  # ============================================================================
  # Convex Tests
  # ============================================================================
  test-convex:
    name: Convex Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Convex tests
        run: pnpm test:convex

  # ============================================================================
  # Convex Deploy Dry-Run (PR gate)
  # ============================================================================
  convex-dry-run:
    name: Convex Deploy Dry-Run
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Convex deploy --dry-run
        run: npx convex deploy --dry-run
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

  # ============================================================================
  # Build Verification
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-sdk, test-convex]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @digilist-saas/shared build

      - name: Build SDK
        run: pnpm sdk:build

      - name: Build web app
        run: pnpm --filter @digilist-saas/web build
        env:
          VITE_CONVEX_URL: https://build-verification.placeholder.invalid

      - name: Build dashboard app
        run: pnpm --filter @digilist-saas/dashboard build
        env:
          VITE_CONVEX_URL: https://build-verification.placeholder.invalid
